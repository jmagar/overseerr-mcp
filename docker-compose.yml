networks:
  jakenet:
    name: ${DOCKER_NETWORK:-overseerr-mcp}
    external: true

services:
  overseerr-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: overseerr-mcp
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${OVERSEERR_MCP_PORT:-9151}:${OVERSEERR_MCP_PORT:-9151}"
    env_file:
      - path: ~/.claude-homelab/.env
        required: false
    volumes:
      - ${APPDATA_PATH:-./data}/overseerr-mcp:/app/data
    networks:
      - jakenet
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${OVERSEERR_MCP_PORT:-9151}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
